name: Install NVGT
description: Downloads and installs NVGT for the current platform.
inputs:
  version:
    description: NVGT version to install
    required: false
    default: '0.90.0_dev'
  add-to-path:
    description: Add the install directory to PATH
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Install NVGT (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $version = "${{ inputs.version }}"
        $url = "https://github.com/samtupy/nvgt/releases/download/latest/nvgt_$version.exe"
        $installer = "$env:TEMP\nvgt_$version.exe"
        Write-Host "Downloading: $url"
        Invoke-WebRequest -Uri $url -OutFile $installer
        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/DIR=C:\nvgt" -Wait
        Write-Host "NVGT installed at C:\nvgt"
        if ("${{ inputs.add-to-path }}" -eq "true") {
          echo "C:\nvgt" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        }
    - name: Install NVGT (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        URL="https://github.com/samtupy/nvgt/releases/download/latest/nvgt_${VERSION}.dmg"
        DMG="$RUNNER_TEMP/nvgt_${VERSION}.dmg"
        MOUNT="/Volumes/NVGT"
        echo "Downloading: $URL"
        curl -fsSL "$URL" -o "$DMG"
        hdiutil attach "$DMG" -mountpoint "$MOUNT"
        [ -d /Applications/NVGT.app ] && sudo rm -rf /Applications/NVGT.app
        sudo cp -R "$MOUNT/NVGT.app" /Applications/
        hdiutil detach "$MOUNT"
        echo "NVGT installed at /Applications/NVGT.app"
        if [ "${{ inputs.add-to-path }}" = "true" ]; then
          echo "/Applications/NVGT.app/Contents/MacOS" >> "$GITHUB_PATH"
        fi
    - name: Install NVGT (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        URL="https://github.com/samtupy/nvgt/releases/download/latest/nvgt_${VERSION}.tar.gz"
        ARCHIVE="$RUNNER_TEMP/nvgt_${VERSION}.tar.gz"
        INSTALL_DIR="/opt/nvgt"
        echo "Downloading: $URL"
        curl -fsSL "$URL" -o "$ARCHIVE"
        sudo mkdir -p "$INSTALL_DIR"
        sudo tar -xzf "$ARCHIVE" -C "$INSTALL_DIR"
        echo "NVGT installed at $INSTALL_DIR"
        if [ "${{ inputs.add-to-path }}" = "true" ]; then
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
        fi
